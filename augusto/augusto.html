<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>augusto</title>
    <link rel="stylesheet" href="augusto.css">
</head>
<body>
    <nav><label class="switch">
  <input type="checkbox" id="dark-mode-toggle">
  <span class="slider"></span>
</label>
</nav>
    
    <div class="container">
    <h1>Clique no Ovo Mágico! 🥚✨</h1>
    <p>Clique várias vezes até ele quebrar...</p>
    
    <div class="egg-container" id="eggContainer">
      <div class="egg" id="egg">
        <!-- Metade de cima -->
        <div class="half top-half" id="topHalf"></div>
        <!-- Metade de baixo -->
        <div class="half bottom-half" id="bottomHalf"></div>
        
        <!-- Rachadura -->
        <div class="crack" id="crack"></div>
        
        <!-- Gema -->
        <div class="yolk" id="yolk"></div>
      </div>
    </div>
  </div>
    <img src="images.png" alt="">
</body>
<script src="augusto.js"></script>
</html>
